<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> eFootball </title>
    <style>
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body {
            background-color: #0d0f14;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }
                .bg-line-1 {
            position: absolute; top: 10%; left: -5%; width: 40%; height: 70px;
            background: linear-gradient(to right, transparent, #0f23d9);
            transform: rotate(-35deg); z-index: -1; border-radius: 35px; opacity: 0.6;
        }
        .bg-line-2 {
            position: absolute; bottom: 5%; right: -5%; width: 50%; height: 80px;
            background: linear-gradient(to left, transparent, #0f23d9);
            transform: rotate(-35deg); z-index: -1; border-radius: 40px; opacity: 0.6;
        }
        .section-title {
            font-size: 32px;
            font-weight: 800;
            margin-top: 40px auto 20px auto;
            text-align: center;
            background-color: #00002c;
            padding: 10px 50px;
            border-radius: 50px;
            width: fit-content;
            box-shadow: 0 4px 15px rgba(15, 35, 217, 0.4);
            animation: fadeInDown 0.5s ease forwards;
        }
        .packs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            direction: rtl;
            justify-content: flex-start;
            width: 100%;
            padding:0 40px;
            box-sizing: border-box;
            animation: fadeInDown 0.5s ease forwards;
            margin-top: 50px;
        }
        .pack-card {
            background-color: #151821;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid #232838;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .pack-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(15, 35, 217, 0.3);
        }
        .pack-image-area {
            width: 100%;
            height: 210px;
            background-color: #1b1f2c;
            position: relative;
        }
        .pack-image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .pack-details {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .pack-type {
            color: #8a94a6;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .pack-name {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pack-timer {
            color: #ff4a4a;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 12px;
        }
        .pack-footer-btns {
            display: flex;
            gap: 12px;
            margin-top: auto;
        }
        .btn-view, .btn-coins {
            flex: 1;
            background-color: #202533;
            border: none;
            border-radius: 14px;
            padding: 12px;
            color: #ffffff;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s;
        }
        .btn-view:hover {
            background-color: #293042;
        }
        .btn-coins {
            background-color: #1a2238;
            border: 1px solid #1f3bb3;
        }
        .coin-icon {
            width: 18px;
            height: 18px;
            background-color: #cca300;
            color: #000;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 0 6px #ffcc00;
        }
        .back-capsule-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #0f23d9;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(15, 35, 217, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            z-index: 100;
            animation: fadeInDown 0.4s ease forwards;
        }
        .back-capsule-btn:hover {
            background-color: #172ce6;
            transform: scale(1.05);
        }
        .arrow-icon {
            border: solid white;
            border-width: 0 3px 3px 0;
            display: inline-block;
            padding: 3px;
            transform: rotate(-45deg);
            -webkit-transform: rotate(-45deg);
        }

.modal-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.8);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.modal-box {
  background-color: #151821;
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  position: relative;
  text-align: center;
  border: 1px solid #232838;
  animation: fadeInDown 0.3s ease forwards;
}
.close-btn {
  position: absolute;
  top: 15px; left: 15px; 
  background: none; border: none;
  color: #8a94a6; font-size: 24px; cursor: pointer;
}
.close-btn:hover { color: #fff; }
.modal-text {
  color: #fff; font-size: 16px; font-weight: bold; margin: 20px 0; line-height: 1.6;
}
.modal-actions {
  display: flex; gap: 15px; justify-content: center; margin-top: 25px;
}
.btn-cancel {
  background: #202533; color: #fff; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; flex: 1;
}
.btn-continue {
  background: #e74c3c; color: #fff; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; flex: 1; transition: 0.2s;
}
.btn-continue:hover { background: #c0392b; }
.chat-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background-color: #0d0f14;
  display: none; 
  flex-direction: column;
  z-index: 1001;
}
.chat-header {
  background: #151821; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #232838;
}
.close-chat-btn {
  background: #202533; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer;
}
.chat-area {
  flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
}
.msg {
  max-width: 80%; padding: 12px 18px; border-radius: 15px; font-size: 15px; line-height: 1.5;
}
.msg.user { background: #293042; color: #fff; align-self: flex-start; border-bottom-right-radius: 2px; }
.msg.bot { background: #0f23d9; color: #fff; align-self: flex-end; border-bottom-left-radius: 2px; }
.chat-input-container {
  padding: 15px; background: #151821; display: flex; gap: 10px; align-items: center;
}
.chat-input {
  flex: 1; background: #202533; border: 1px solid #232838; color: white; padding: 15px; border-radius: 25px; outline: none; font-family: inherit;
}
.send-btn {
  background: #fff; color: #0d0f14; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s;
}
.send-btn:hover { background: #ccc; }
.pay-btn {
  background-color: #cca300; 
  color: #000;
  border: none;
  padding: 8px 15px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  margin-right: 15px;
  display: none; 
}
.pay-btn:hover { background-color: #e6b800; }
.system-msg {
  text-align: center;
  color: #4CAF50;
  font-weight: bold;
  margin: 15px auto;
  background: rgba(76, 175, 80, 0.15);
  padding: 10px 20px;
  border-radius: 20px;
  width: fit-content;
  align-self: center;
}
.trusted-data {
  background-color: #2c0b0e;
  border: 1px dashed #ff4a4a;
  color: #fff;
  align-self: center;
  width: 90%;
  text-align: right;
}
.trusted-data span { color: #ff4a4a; font-weight: bold; }
    .buyer-waiting-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 41, 0.95);
    display: none; 
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    color: #fff;
    backdrop-filter: blur(5px);
}
.loader-spinner {
    border: 5px solid #232838;
    border-top: 5px solid #cca300; 
    border-radius: 50%;
    width: 60px;
    height: 60px;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
}
 @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

<!-- Firebase Libraries -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
  const coinButtons = document.querySelectorAll('.btn-coins');
  const modal = document.getElementById('purchaseModal');
  const closeModal = document.getElementById('closeModal');
  const cancelPurchase = document.getElementById('cancelPurchase');
  const continuePurchase = document.getElementById('continuePurchase');
  
  const chatInterface = document.getElementById('chatInterface');
  const closeChat = document.getElementById('closeChat');
  const chatArea = document.getElementById('chatArea');
  const msgInput = document.getElementById('msgInput');
  const sendMsgBtn = document.getElementById('sendMsgBtn');
  const payBtn = document.getElementById('payBtn');
  let currentSelectedPack = null; 
  let currentChatId = null;
 const dynamicContainer = document.getElementById('dynamic-packs-container');
if (dynamicContainer) {
    dynamicContainer.addEventListener('click', async (e) => {
        const coinBtn = e.target.closest('.btn-coins');
        if (coinBtn) {
            e.preventDefault();
            
            const pack = coinBtn.closest('.pack-card');
            const packId = pack.getAttribute('data-id');
            try {
                const checkQuery = await db.collection('active_chats')
                    .where('packId', '==', packId)
                    .where('status', 'in', ['waiting', 'active'])
                    .get();
                if (!checkQuery.empty) {
                    alert('عذراً، هذا الحساب معلق حالياً (قيد التنفيذ مع مشتري آخر).');
                    return; 
                }
                modal.style.display = 'flex';
                currentSelectedPack = pack;
            } catch (error) {
                console.error("خطأ في فحص حالة الحساب:", error);
                alert('حدث خطأ في الاتصال، جرب مرة تانية.');
            }
        }
    });
}
 const hideModal = async () => {
    modal.style.display = 'none';
    
    // التأكد إن في حساب تم اختياره
    if (currentSelectedPack) {
        const packId = currentSelectedPack.getAttribute('data-id');
        try {
            // البحث عن الطلب المعلق الخاص بهذا الحساب
            const chatQuery = await db.collection('active_chats')
                .where('packId', '==', packId)
                .where('status', '==', 'waiting')
                .get();

            // مسح الطلب من الداتابيز
            chatQuery.forEach(async (doc) => {
                await db.collection('active_chats').doc(doc.id).delete();
            });
            console.log("تم إلغاء الطلب ورجوع الحساب للمتجر");
        } catch (error) {
            console.error("خطأ في إلغاء الطلب:", error);
        }
    }
};
  closeModal.addEventListener('click', hideModal);
  cancelPurchase.addEventListener('click', hideModal);
continuePurchase.addEventListener('click', async () => {

    hideModal(); 
msgInput.disabled = true;
sendMsgBtn.disabled = true;
msgInput.placeholder = "انتظر دخول الوسيط لكتابة رسالتك...";
    chatInterface.style.display = 'flex';
    chatArea.innerHTML = `
        <div class="system-msg" id="waitingMsg" style="text-align: center; color: #ff9800; font-weight: bold; margin-bottom: 15px;">
            ⏳ جاري البحث عن وسيط موثوق، يرجى الانتظار داخل المحادثة...
        </div>
    `;
    try {
        const newChatRef = await db.collection('active_chats').add({
            packId: currentSelectedPack.getAttribute('data-id'),
            status: 'waiting',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
currentChatId = newChatRef.id;
        db.collection('active_chats').doc(newChatRef.id).onSnapshot((doc) => {
            const chatData = doc.data();
            if (chatData && chatData.status === 'active') {
                const waitingMsg = document.getElementById('waitingMsg');
                if (waitingMsg) {
                    waitingMsg.style.display = 'none'; 
                    // الاستماع للرسائل في هذه المحادثة
db.collection('active_chats').doc(currentChatId).collection('messages').orderBy('timestamp')
    .onSnapshot(snapshot => {
        snapshot.docChanges().forEach(change => {
            if (change.type === 'added') {
                const msg = change.doc.data();
                // لو المشتري هو اللي باعت لونها أزرق (user)، لو الوسيط لونها رمادي (bot)
                const msgClass = msg.sender === 'buyer' ? 'msg user' : 'msg bot';
                chatArea.innerHTML += `<div class="${msgClass}">${msg.text}</div>`;
                chatArea.scrollTop = chatArea.scrollHeight; // النزول لأسفل الشات تلقائياً
            }
        });
    });
                }
                chatArea.innerHTML += `
                    <div class="system-msg" style="text-align: center; color: #4CAF50; font-weight: bold; margin-bottom: 15px;">
                        تم الاتصال بالوسيط ${chatData.mediatorName} بنجاح ✔️
                    </div>
                `;
msgInput.disabled = false;
sendMsgBtn.disabled = false;
msgInput.placeholder = "اكتب رسالتك هنا...";               
                const payBtn = document.getElementById('payBtn');
                if (payBtn) payBtn.style.display = 'block';
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        });
    } catch (error) {
        console.error("خطأ في إنشاء المحادثة:", error); 
        chatArea.innerHTML += `
            <div class="system-msg" style="text-align: center; color: #f44336; font-weight: bold; margin-bottom: 15px;">
                ❌ حصلت مشكلة في الاتصال بالسيرفر، تأكد من اتصالك بالإنترنت وجرب تاني.
            </div>
        `;
    }
});
  closeChat.addEventListener('click', () => {
    chatInterface.style.display = 'none';
  });

  sendMsgBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') sendMessage();
  });
  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !currentChatId) return; // التأكد إن فيه رسالة وفيه محادثة شغالة

    // إرسال الرسالة لقاعدة البيانات
    db.collection('active_chats').doc(currentChatId).collection('messages').add({
        text: text,
        sender: 'buyer', // عشان نعرف إن دي رسالة المشتري
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    msgInput.value = ''; // تفريغ مربع الإدخال
}
  function botReply(fullText) {
    const msgId = 'bot-' + Date.now();
    chatArea.innerHTML += `<div class="msg bot" id="${msgId}"></div>`;
    const botMsgElement = document.getElementById(msgId);
    let index = 0;
    const typingInterval = setInterval(() => {
      if (index < fullText.length) {
        botMsgElement.innerHTML += fullText.charAt(index);
        index++;
        chatArea.scrollTop = chatArea.scrollHeight;
      } else {
        clearInterval(typingInterval);
      }
    }, 40);
  }
if (payBtn) {
    payBtn.addEventListener('click', async () => {
        payBtn.style.display = 'none';
        chatArea.innerHTML += `
        <div class="msg" style="text-align: center; color: #4CAF50; font-weight: bold; margin: 15px auto; background: rgba(76, 175, 80, 0.15); padding: 10px 20px;">
            تم الدفع بنجاح ✔
        </div>
        `;
        chatArea.scrollTop = chatArea.scrollHeight;
if (currentSelectedPack) {
    // 1. عرف المتغير أولاً
    const packId = currentSelectedPack.getAttribute('data-id');
    // 2. ابدأ الـ try عشان تنفذ الأوامر
    try {
        // 3. استخدم المتغير في الحذف بعد ما اتعرف
        await db.collection("pes_packs").doc(packId).delete();
        
        // 4. امسح من الشاشة
        currentSelectedPack.remove();
        currentSelectedPack = null;
        console.log("تم الحذف بنجاح من الداتابيز والشاشة");
        
    } catch (error) {
        console.error("خطأ في حذف البيانات: ", error);
    }
}
    });
}
const firebaseConfig = {
  apiKey: "AIzaSyB3E9e2aFVgrpTm0df7tC_YKskT-MA3hOs",
  authDomain: "my-pes-shop.firebaseapp.com",
  projectId: "my-pes-shop",
  storageBucket: "my-pes-shop.firebasestorage.app",
  messagingSenderId: "438807292964",
  appId: "1:438807292964:web:38709635a02d9e1bd8bcb1",
  measurementId: "G-WFGKMQ8PDY"
};
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();
function loadPacks() {
  const container = document.getElementById('dynamic-packs-container');
  container.innerHTML = '<h3>جاري تحميل الباكات...</h3>'; 
  db.collection("pes_packs").get().then((querySnapshot) => {
    container.innerHTML = ''; 
    querySnapshot.forEach((doc) => {
      const pack = doc.data();
      container.innerHTML += `
      <div class="pack-card" data-id="${doc.id}">
            <div class="pack-image-area">
                <img src="${pack.mainImage}" alt="${pack.packType}">
            </div>
            <div class="pack-details">
                <div class="pack-type">${pack.packType}</div>
                <div class="pack-name">${pack.packName}</div>
                <div class="pack-timer">⏳ ${pack.timerText}</div>
                
                <div class="pack-footer-btns">
                  <button class="btn-view" type="button" onclick="window.location.href='pack.details.html?id=${doc.id}'">مشاهدة</button>
                    <button class="btn-coins" type="button">
                        <span class="coin-icon">C</span>
                        ${pack.price}
                    </button>
                </div>
            </div>
        </div>
      `;
    });
  }).catch((error) => {
      console.log("Error getting packs: ", error);
  });
}

// تشغيل الدالة أول ما الصفحة تفتح
window.onload = () => {
    loadPacks();
};
// --- كود إغلاق الشات وإلغاء الطلب ---
const closeChatBtn = document.getElementById('close-chat-btn');

if (closeChatBtn) {
    closeChatBtn.addEventListener('click', async () => {
        // 1. إخفاء واجهة الشات أولاً
        const chatInterface = document.getElementById('chat-interface'); // اتأكد إن ده الـ ID بتاع واجهة الشات
        if (chatInterface) chatInterface.style.display = 'none';
        
        // 2. لو فيه شات متسجل، هنمسحه من الفايربيز
        if (typeof currentChatId !== 'undefined' && currentChatId) {
            try {
                await db.collection('active_chats').doc(currentChatId).delete();
                console.log("تم إلغاء الطلب، والحساب رجع متاح");
                
                // 3. تصفير المتغيرات
                currentChatId = null;
                const chatArea = document.getElementById('chat-messages'); // اتأكد من الـ ID
                if (chatArea) chatArea.innerHTML = ''; 
                
            } catch (error) {
                console.error("حدث خطأ أثناء مسح الطلب: ", error);
            }
        }
    });
}
function endMediatorChat(chatId) {
    // 1. نمسح المحادثة من الفايربيز عشان الحساب يرجع متاح
    db.collection('chats').doc(chatId).delete().then(() => {
        
        // 2. تنبيه وتحديث الواجهة بعد الحذف الناجح
        alert('المشتري ألغى الطلب أو غادر المحادثة');

        document.getElementById('chat-box').style.display = 'none';
        document.getElementById('trusted-dashboard').style.display = 'block';
        
        connectAsTrusted();

    }).catch((error) => {
        console.error("حدث خطأ أثناء إنهاء المحادثة: ", error);
    });
}
        
    
window.addEventListener('beforeunload', () => {
    // لو المشتري كان فاتح محادثة وقفل الصفحة
    if (localStorage.getItem('pendingPurchase') === 'true' && typeof chatDocRef !== 'undefined') {
        chatDocRef.delete();
        localStorage.removeItem('pendingPurchase');
    }
});
</script>
