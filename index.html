 <script>
document.getElementById('trustedLoginBtn').addEventListener('click', () => {
    document.getElementById('trustedModal').style.display = 'block';
});
document.getElementById('closeModalBtn').addEventListener('click', () => {
    document.getElementById('trustedModal').style.display = 'none';
});
document.getElementById('confirmTrustedBtn').addEventListener('click', async () => {
    const inputCode = document.getElementById('trustedCodeInput').value.trim();
    if (inputCode === '') {
        alert('برجاء إدخال كود التفعيل أولاً!');
        return;
    }
    try {
        const querySnapshot = await db.collection('trusted_codes')
            .where('code', '==', inputCode)
            .where('used', '==', false)
            .get();

        if (querySnapshot.empty) {
            alert('الكود غير صحيح، أو تم استخدامه من قبل!');
            return;
        }
        querySnapshot.forEach(async (doc) => {
            await db.collection('trusted_codes').doc(doc.id).update({
                used: true
            });
            localStorage.setItem('userRole', 'trusted');
            localStorage.setItem('loginType', 'trusted');
            localStorage.setItem('userName', 'وسيط موثوق');
            localStorage.setItem('userPicture', 'https://cdn-icons-png.flaticon.com/512/149/149071.png');
            alert('تم تفعيل حساب التراستيد بنجاح! 🎉');
            window.location.reload();
        });
    } catch (error) {
        console.error('خطأ في السيرفر أثناء التحقق: ', error);
        alert('حدث خطأ ما، يرجى المحاولة مرة أخرى.');
    }
});
const mediatorCallBtn = document.getElementById('mediatorCallBtn');
const defaultGuestAvatar = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    const auth = firebase.auth();
    
    // استخدام النافذة المنبثقة بدلاً من التحويل لتجنب مشاكل إعادة تحميل الصفحة
    auth.signInWithPopup(provider)
    .then((result) => {
        // تم تسجيل الدخول بنجاح
        const user = result.user;
        
        // استخدام دالة حفظ الجلسة الموجودة عندك في السطر 495
        saveSession("Google", user.photoURL, user.displayName, user.email);
        
        // إخفاء صفحة تسجيل الدخول وإظهار الموقع
        document.getElementById("loginPage").style.display = "none";
    })
    .catch((error) => {
        console.error("خطأ في تسجيل الدخول: ", error);
        alert("حدث خطأ أثناء تسجيل الدخول، يرجى المحاولة مرة أخرى.");
    });
}
function loginAsGuest() {
    const guestPic = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"; 
    saveSession("guest", guestPic, "زائر", "(وضع التصفح كضيف)");
}
document.getElementById('trustedLoginBtn').addEventListener('click', function() {
    document.getElementById('trustedModal').style.display = 'flex'; 
});
document.getElementById('closeModalBtn').addEventListener('click', function() {
    document.getElementById('trustedModal').style.display = 'none';
});
function saveSession(type, picture, name, email) {
    localStorage.setItem("loginType", type);
    localStorage.setItem("userPicture", picture);
    localStorage.setItem("userName", name);
    localStorage.setItem("userEmail", email);
    applyLoginState(type, picture, name, email);
}
function applyLoginState(type, picture, name, email) {

async function openMediatorChat() {
    const chatInterface = document.getElementById("chatInterface");
    const mediatorCallBtn = document.getElementById("mediatorCallBtn"); // تعريف الزرار
    if (!chatInterface || !mediatorCallBtn) return;
    // 1. حفظ شكل الزرار الأصلي وتغييره لـ "جاري البحث..."
    const originalText = mediatorCallBtn.innerHTML;
    mediatorCallBtn.innerHTML = 'جاري البحث... ⏳';
    mediatorCallBtn.style.pointerEvents = 'none'; // منع الضغط عليه مرتين
    try {
        // 2. البحث عن مشتري في الانتظار
        const waitingChats = await db.collection('active_chats').where('status', '==', 'waiting').limit(1).get();

        if (waitingChats.empty) {
            // لو ملقاش طلبات
            alert("لا يوجد مشترين في الانتظار حالياً.");
            
            // إرجاع الزرار لشكله الأصلي
            mediatorCallBtn.innerHTML = originalText;
            mediatorCallBtn.style.pointerEvents = 'auto';
            return;
        }
        // 3. لو لقى مشتري (ربط الوسيط بالمشتري)
        const chatDoc = waitingChats.docs[0];
    currentChatId = chatDoc.id; // خلي المتغير global زي ما كنت عامله

        await db.collection('active_chats').doc(currentChatId).update({
            status: 'active',
            mediatorName: localStorage.getItem('userName') || 'وسيط موثوق'
        });
        const msgInput = document.getElementById('msgInput');
const sendMsgBtn = document.getElementById('sendMsgBtn');

// دالة إرسال الرسالة من طرف الوسيط
async function sendMediatorMessage() {
    const text = msgInput.value.trim();
    if (!text || !currentChatId) return;

    try {
        // إضافة الرسالة في مسار المحادثة الحالية
        await db.collection('active_chats').doc(currentChatId).collection('messages').add({
            text: text,
            sender: 'mediator', // تمييز إن المرسل هو الوسيط
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        msgInput.value = ''; // تفريغ مربع النص بعد الإرسال
    } catch (error) {
        console.error("خطأ في إرسال الرسالة: ", error);
    }
}

// تشغيل الدالة لما الوسيط يدوس على زرار الإرسال
if(sendMsgBtn) {
    sendMsgBtn.addEventListener('click', sendMediatorMessage);
}

// تشغيل الدالة لما الوسيط يدوس Enter من الكيبورد
if(msgInput) {
    msgInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMediatorMessage();
    });
}

        // 4. تغيير الزرار للأخضر (متصل)
        mediatorCallBtn.innerHTML = 'متصل ✔️';
        mediatorCallBtn.style.backgroundColor = '#27ae60';
        console.log("تم استلام الطلب وفتح الشات للمشتري");

        // 5. إظهار واجهة الشات للوسيط
        chatInterface.style.display = "flex";
        const chatArea = document.getElementById('chatArea');
        if (chatArea) chatArea.innerHTML = ''; // تنظيف الشات القديم

        // 6. الاستماع للرسائل (نفس الكود بتاعك)
        db.collection('active_chats').doc(currentChatId).collection('messages').orderBy('timestamp')
          .onSnapshot(snapshot => {
              snapshot.docChanges().forEach(change => {
                  if (change.type === 'added') {
                      const msg = change.doc.data();
                      const msgClass = msg.sender === 'mediator' ? 'msg user' : 'msg bot';
                      chatArea.innerHTML += `<div class="${msgClass}">${msg.text}</div>`;
                      chatArea.scrollTop = chatArea.scrollHeight;
                  }
              });
          });

    } catch (error) {
        console.error("حدث خطأ أثناء الاتصال بالمشتري:", error);
        alert("حدث خطأ، يرجى المحاولة مرة أخرى.");
        // إرجاع الزرار لشكله الأصلي لو حصل خطأ
        mediatorCallBtn.innerHTML = originalText;
        mediatorCallBtn.style.pointerEvents = 'auto';
    }
}
