function parseJwt (token) {
    var base64Url = token.split('.')[1];
    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(jsonPayload);
}
function handleCredentialResponse(response) {
    const payload = parseJwt(response.credential);
    saveSession("google", payload.picture, payload.name, payload.email);
}
function loginAsGuest() {
    const guestPic = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

}

function saveSession(type, picture, name, email) {
    localStorage.setItem("loginType", type);
    localStorage.setItem("userPicture", picture);
    localStorage.setItem("userName", name);
    localStorage.setItem("userEmail", email);
    applyLoginState(type, picture, name, email);
}

    if (userProfile && userAvatar) {
        userProfile.style.display = "flex";
        userAvatar.src = picture;
    }
}
