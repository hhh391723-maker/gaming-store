<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل الباك</title>
    <link rel="stylesheet" href="styles.css"> 
    <style>
        .details-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #151821;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #232838;
            padding-bottom: 15px;
        }
        /* تصميم زرار الرجوع اللي طلبته */
        .btn-back {
            background-color: #202533;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .btn-back:hover { background-color: #293042; }
        
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .images-grid img {
            width: 100%;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid #232838;
        }
        .pack-title { color: #fff; font-size: 24px; }
    </style>
</head>
<body>

    <div class="details-container">
        <div class="header-actions">
            <h2 class="pack-title" id="packTitle">جاري التحميل...</h2>
            <button class="btn-back" onclick="window.history.back()">رجوع ⬅</button>
        </div>
        
        <div class="images-grid" id="imagesContainer">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script>
        // حط اعدادات الفايربيس بتاعتك هنا (نفس اللي في index)
        const firebaseConfig = {
            apiKey: "AIzaSyB3E9e2...", // كمل اعداداتك
            authDomain: "my-pes-shop.firebaseapp.com",
            projectId: "my-pes-shop",
            // ... الباقي
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // دالة لجلب الـ ID من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const packId = urlParams.get('id');

        if(packId) {
            // جلب الدوكيومنت من فايربيس
            db.collection('pes_packs').doc(packId).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('packTitle').innerText = data.packName;
                    
                    const container = document.getElementById('imagesContainer');
                    // التأكد إن فيه صور داخلية
                    if(data.internalImages && data.internalImages.length > 0) {
                        data.internalImages.forEach(imgUrl => {
                            container.innerHTML += `<img src="${imgUrl}" alt="صورة داخلية">`;
                        });
                    } else {
                        container.innerHTML = `<h3 style="color: #8a94a6;">لا توجد صور إضافية لهذا الباك.</h3>`;
                    }
                } else {
                    document.getElementById('packTitle').innerText = "الباك غير موجود";
                }
            }).catch(err => console.log(err));
        }
    </script>
</body>
</html>
